apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: hybridbank
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: hybridbank
    tier: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/part-of: hybridbank
        tier: gateway
    spec:
      containers:
        - name: api-gateway
          image: docker.io/naeemarsalan/hybridbank-api-gateway:latest
          ports:
            - containerPort: 3001
          env:
            - name: ACCOUNT_SERVICE_URL
              value: http://account-service.hybridbank.svc.clusterset.local:3002
            - name: TRANSACTION_SERVICE_URL
              value: http://transaction-service.hybridbank.svc.clusterset.local:3003
            - name: REPLICA_DB_HOST
              value: postgres-core
            - name: REPLICA_DB_PORT
              value: "5432"
            - name: REPLICA_DB_USER
              value: hybridbank
            - name: REPLICA_DB_PASSWORD
              value: hybridbank
            - name: REPLICA_DB_NAME
              value: hybridbank_core
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: hybridbank
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: hybridbank
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
