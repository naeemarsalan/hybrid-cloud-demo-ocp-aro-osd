apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: hybridbank
  labels:
    app: frontend
    app.kubernetes.io/part-of: hybridbank
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/part-of: hybridbank
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: docker.io/naeemarsalan/hybridbank-frontend:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: hybridbank
  labels:
    app: frontend
    app.kubernetes.io/part-of: hybridbank
spec:
  selector:
    app: frontend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: hybridbank
  namespace: hybridbank
  labels:
    app: frontend
    app.kubernetes.io/part-of: hybridbank
spec:
  to:
    kind: Service
    name: frontend
    weight: 100
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
