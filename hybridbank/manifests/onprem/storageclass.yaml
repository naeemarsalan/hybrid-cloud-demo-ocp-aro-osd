apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: px-csi-replicated
provisioner: pxd.portworx.com
parameters:
  repl: "3"
  io_profile: db_remote
  priority_io: "high"
reclaimPolicy: Retain
allowVolumeExpansion: true
volumeBindingMode: Immediate
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: px-csi-db
provisioner: pxd.portworx.com
parameters:
  repl: "3"
  io_profile: db
  priority_io: "high"
reclaimPolicy: Retain
allowVolumeExpansion: true
volumeBindingMode: Immediate
