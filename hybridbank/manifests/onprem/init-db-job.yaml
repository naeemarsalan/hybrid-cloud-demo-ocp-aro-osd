apiVersion: batch/v1
kind: Job
metadata:
  name: init-db
  namespace: hybridbank
  labels:
    app.kubernetes.io/part-of: hybridbank
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: init-db
        app.kubernetes.io/part-of: hybridbank
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres-core
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres-core -U hybridbank; do
                echo "Waiting for postgres-core..."
                sleep 2
              done
        - name: wait-for-postgres-archive
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres-archive -U hybridbank; do
                echo "Waiting for postgres-archive..."
                sleep 2
              done
      containers:
        - name: init-db
          image: postgres:15-alpine
          env:
            - name: PGPASSWORD
              value: hybridbank
          command:
            - sh
            - -c
            - |
              echo "=== Initializing hybridbank_core on postgres-core ==="
              # Check if already initialized
              EXISTING=$(psql -h postgres-core -U hybridbank -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='hybridbank_core'" 2>/dev/null || true)
              if [ "$EXISTING" = "1" ]; then
                echo "hybridbank_core already exists, checking for tables..."
                TABLE_COUNT=$(psql -h postgres-core -U hybridbank -d hybridbank_core -tAc "SELECT count(*) FROM information_schema.tables WHERE table_schema='public'" 2>/dev/null || echo "0")
                if [ "$TABLE_COUNT" -gt "0" ]; then
                  echo "Tables already exist ($TABLE_COUNT tables), skipping core init."
                else
                  echo "Database exists but no tables, running core schema..."
                  psql -h postgres-core -U hybridbank -d hybridbank_core -f /init/init-core.sql
                fi
              else
                echo "Creating hybridbank_core database..."
                psql -h postgres-core -U hybridbank -d postgres -c "CREATE DATABASE hybridbank_core;"
                psql -h postgres-core -U hybridbank -d hybridbank_core -f /init/init-core.sql
              fi

              echo "=== Initializing hybridbank_archive on postgres-archive ==="
              EXISTING=$(psql -h postgres-archive -U hybridbank -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='hybridbank_archive'" 2>/dev/null || true)
              if [ "$EXISTING" = "1" ]; then
                TABLE_COUNT=$(psql -h postgres-archive -U hybridbank -d hybridbank_archive -tAc "SELECT count(*) FROM information_schema.tables WHERE table_schema='public'" 2>/dev/null || echo "0")
                if [ "$TABLE_COUNT" -gt "0" ]; then
                  echo "Tables already exist ($TABLE_COUNT tables), skipping archive init."
                else
                  psql -h postgres-archive -U hybridbank -d hybridbank_archive -f /init/init-archive.sql
                fi
              else
                psql -h postgres-archive -U hybridbank -d postgres -c "CREATE DATABASE hybridbank_archive;"
                psql -h postgres-archive -U hybridbank -d hybridbank_archive -f /init/init-archive.sql
              fi

              echo "=== Database initialization complete ==="
          volumeMounts:
            - name: init-scripts
              mountPath: /init
      volumes:
        - name: init-scripts
          configMap:
            name: init-db-scripts
---
