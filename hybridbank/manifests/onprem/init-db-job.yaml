        balance NUMERIC(12,2) NOT NULL DEFAULT 0,
        type VARCHAR(20) NOT NULL CHECK (type IN ('checking', 'savings')),
        created_at TIMESTAMP DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS transactions (
