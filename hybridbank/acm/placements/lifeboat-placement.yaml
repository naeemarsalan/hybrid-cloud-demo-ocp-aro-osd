apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: lifeboat-placement
  namespace: hybridbank
  labels:
    app.kubernetes.io/part-of: hybridbank
spec:
  numberOfClusters: 1
  clusterSets:
    - hybrid-cloud-demo
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: cloud
              operator: In
              values:
                - azure
                - gcp
        claimSelector:
          matchExpressions: []
  tolerations:
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
      tolerationSeconds: 30
