apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix
  namespace: phoenix
  labels:
    app: phoenix
    app.kubernetes.io/part-of: phoenix
    tier: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phoenix
  template:
    metadata:
      labels:
        app: phoenix
        app.kubernetes.io/part-of: phoenix
        tier: server
    spec:
      containers:
        - name: phoenix
          image: arizephoenix/phoenix:version-13.18.2-nonroot
          ports:
            - name: http
              containerPort: 6006
            - name: grpc
              containerPort: 4317
            - name: metrics
              containerPort: 9090
          env:
            - name: PHOENIX_PORT
              value: "6006"
            - name: PHOENIX_GRPC_PORT
              value: "4317"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: phoenix-secrets
                  key: POSTGRES_PASSWORD
            - name: PHOENIX_SQL_DATABASE_URL
              value: postgresql://phoenix:$(POSTGRES_PASSWORD)@phoenix-postgres:5432/phoenix
            - name: PHOENIX_SECRET
              valueFrom:
                secretKeyRef:
                  name: phoenix-secrets
                  key: PHOENIX_SECRET
            - name: PHOENIX_ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: phoenix-secrets
                  key: PHOENIX_ADMIN_SECRET
            - name: PHOENIX_ENABLE_AUTH
              value: "false"
            - name: PHOENIX_ENABLE_PROMETHEUS
              value: "true"
            - name: PHOENIX_TELEMETRY_ENABLED
              value: "false"
            - name: PHOENIX_WORKING_DIR
              value: /data
          volumeMounts:
            - name: phoenix-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6006
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6006
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: phoenix-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: phoenix
  namespace: phoenix
  labels:
    app: phoenix
    app.kubernetes.io/part-of: phoenix
spec:
  selector:
    app: phoenix
  ports:
    - name: http
      port: 6006
      targetPort: 6006
    - name: grpc
      port: 4317
      targetPort: 4317
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: phoenix
  namespace: phoenix
  labels:
    app: phoenix
    app.kubernetes.io/part-of: phoenix
spec:
  to:
    kind: Service
    name: phoenix
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
