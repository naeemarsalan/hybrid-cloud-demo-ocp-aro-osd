---
- name: Phoenix AI Observability — Deploy via ArgoCD
  hosts: hub
  gather_facts: false
  tasks:
    - name: Display Phoenix banner
      ansible.builtin.debug:
        msg: |
          =============================================
          Phoenix AI Observability — Burst-to-Cloud Demo
          =============================================
          Deploying Phoenix to on-prem with burst
          scaling capability to ARO + OSD.
          =============================================

    - name: Deploy Phoenix
      ansible.builtin.include_role:
        name: phoenix
