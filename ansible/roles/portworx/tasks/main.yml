---
- name: Set KUBECONFIG for this cluster
  ansible.builtin.set_fact:
    k8s_kubeconfig: "{{ onprem_kubeconfig | default(kubeconfig) }}"

- name: Create portworx namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ px_namespace }}"

- name: Create Portworx OperatorGroup
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    definition:
      apiVersion: operators.coreos.com/v1
      kind: OperatorGroup
      metadata:
        name: portworx-operator-group
        namespace: "{{ px_namespace }}"
      spec:
        targetNamespaces:
          - "{{ px_namespace }}"

- name: Create Portworx Subscription
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: portworx-certified
        namespace: "{{ px_namespace }}"
      spec:
        channel: stable
        installPlanApproval: Automatic
        name: portworx-certified
        source: certified-operators
        sourceNamespace: openshift-marketplace

- name: Wait for Portworx CSV to succeed
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    namespace: "{{ px_namespace }}"
    label_selectors:
      - "operators.coreos.com/portworx-certified.portworx="
  register: px_csv
  until: >-
    px_csv.resources | length > 0 and
    px_csv.resources[0].status.phase | default('') == 'Succeeded'
  retries: 60
  delay: 10

- name: Create cloud credential secret (Azure)
  when: cloud == 'azure'
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: px-azure
        namespace: "{{ px_namespace }}"
      type: Opaque
      stringData:
        AZURE_CLIENT_ID: "{{ azure_client_id }}"
        AZURE_CLIENT_SECRET: "{{ azure_client_secret }}"
        AZURE_TENANT_ID: "{{ azure_tenant_id }}"

- name: Create cloud credential secret (GCP)
  when: cloud == 'gcp'
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: px-gcloud
        namespace: "{{ px_namespace }}"
      type: Opaque
      data:
        gcloud.json: "{{ gcp_sa_json | b64encode }}"

- name: Apply StorageCluster
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    template: "{{ px_template }}.yaml.j2"

- name: Wait for Portworx pods to be Ready
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    api_version: v1
    kind: Pod
    namespace: "{{ px_namespace }}"
    label_selectors:
      - "name=portworx"
  register: px_pods
  until: >-
    px_pods.resources | length > 0 and
    px_pods.resources | map(attribute='status.phase') | select('equalto', 'Running') | list | length ==
    px_pods.resources | length
  retries: 120
  delay: 15

- name: Verify pxctl status
  ansible.builtin.shell:
    cmd: >-
      oc --kubeconfig={{ k8s_kubeconfig }} -n {{ px_namespace }}
      exec $(oc --kubeconfig={{ k8s_kubeconfig }} -n {{ px_namespace }} get pods -l name=portworx -o jsonpath='{.items[0].metadata.name}')
      -- /opt/pwx/bin/pxctl status
  register: pxctl_status
  changed_when: false
  retries: 10
  delay: 15
  until: "'Status: PX is operational' in pxctl_status.stdout"
