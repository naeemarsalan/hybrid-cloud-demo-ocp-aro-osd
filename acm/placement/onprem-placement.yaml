apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: onprem-placement
  namespace: online-boutique
  labels:
    app.kubernetes.io/part-of: online-boutique
spec:
  numberOfClusters: 1
  clusterSets:
    - hybrid-cloud-demo
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            cloud: on-prem
            environment: demo
